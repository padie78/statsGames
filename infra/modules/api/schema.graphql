type Query {
  health: String! @aws_api_key
  getPlayerProfile(userId: ID!): PlayerProfile!
    @aws_api_key
    @aws_cognito_user_pools
  getProfileByGamerTag(gamerTag: String!): PublicPlayerProfile! @aws_api_key
  searchPlayers(query: String!, limit: Int): [PlayerSearchHit!]! @aws_api_key
  listPlayerMatches(userId: ID!, platform: String, limit: Int): [MatchUpdate!]!
    @aws_api_key
    @aws_cognito_user_pools
  listPlayerStatsRollups(
    userId: ID!
    granularity: String!
    periodId: String!
    platform: String
    limit: Int
  ): [PlayerStatsRollup!]!
    @aws_api_key
    @aws_cognito_user_pools
  listPlayerDailyTrend(userId: ID!, platform: String, days: Int): [PlayerStatsRollup!]!
    @aws_api_key
    @aws_cognito_user_pools
  getCommunityBenchmarks(platform: String!, periodId: String!): CommunityBenchmarks! @aws_api_key
  listWeeklyLeaderboard(platform: String!, periodId: String!, limit: Int): [LeaderboardEntry!]!
    @aws_api_key
}

type PlayerProfile @aws_api_key @aws_cognito_user_pools {
  userId: ID!
  gamerTag: String!
  primaryPlatform: String!
  fortniteId: String
  robloxId: String
  avatarUrl: String
  createdAtIso: AWSDateTime!
  updatedAtIso: AWSDateTime!
  versionId: Int!
}

type PublicPlayerProfile @aws_api_key {
  userId: ID!
  gamerTag: String!
  primaryPlatform: String!
  avatarUrl: String
  createdAtIso: AWSDateTime!
}

type PlayerSearchHit @aws_api_key {
  userId: ID!
  gamerTag: String!
  primaryPlatform: String!
  avatarUrl: String
}

input UpsertPlayerProfileInput {
  userId: ID!
  gamerTag: String!
  primaryPlatform: String!
  fortniteId: String
  robloxId: String
  avatarUrl: String
}

input LinkPlatformAccountInput {
  userId: ID!
  platform: String!
  externalId: String!
}

input MatchStatsInput {
  kills: Int
  deaths: Int
  placement: Int
  assists: Int
}

input MatchUpdateInput {
  userId: ID!
  matchId: ID!
  platform: String!
  summary: String!
  updatedAt: AWSDateTime!
  stats: MatchStatsInput
}

type Mutation {
  ping(message: String!): String! @aws_api_key @aws_cognito_user_pools
  upsertPlayerProfile(input: UpsertPlayerProfileInput!): PlayerProfile!
    @aws_api_key
    @aws_cognito_user_pools
  linkPlatformAccount(input: LinkPlatformAccountInput!): PlayerProfile!
    @aws_api_key
    @aws_cognito_user_pools
  publishMatchUpdate(input: MatchUpdateInput!): MatchUpdate @aws_api_key
}

type Subscription {
  onMatchUpdate(userId: ID!): MatchUpdate
    @aws_subscribe(mutations: ["publishMatchUpdate"])
    @aws_cognito_user_pools
}

type MatchStats @aws_api_key @aws_cognito_user_pools {
  kills: Int
  deaths: Int
  placement: Int
  assists: Int
}

type MatchUpdate @aws_api_key @aws_cognito_user_pools {
  userId: ID!
  matchId: ID!
  platform: String!
  summary: String!
  updatedAt: AWSDateTime!
  stats: MatchStats
}

type PlayerStatsRollup @aws_api_key @aws_cognito_user_pools {
  userId: ID!
  platform: String!
  granularity: String!
  periodId: String!
  matchCount: Int!
  totalKills: Int!
  totalDeaths: Int!
  avgPlacement: Float!
  versionId: Int!
  lastUpdatedIso: AWSDateTime!
}

type CommunityBenchmarks @aws_api_key {
  platform: String!
  periodId: String!
  sampleSize: Int!
  avgWinRate: Float!
  avgKd: Float!
  avgKillsPerWeek: Float!
  avgMatchesPerWeek: Float!
  winRateStd: Float!
  kdStd: Float!
  killsStd: Float!
  lastUpdatedIso: AWSDateTime!
}

type LeaderboardEntry @aws_api_key {
  rank: Int!
  userId: ID!
  gamerTag: String!
  platform: String!
  score: Int!
  totalKills: Int!
  matchCount: Int!
  delta: String!
  trend: String!
}
