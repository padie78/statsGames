type Query {
  health: String!
  getPlayerProfile(userId: ID!): PlayerProfile!
  getProfileByGamerTag(gamerTag: String!): PublicPlayerProfile!
  searchPlayers(query: String!, limit: Int): [PlayerSearchHit!]!
  listPlayerMatches(userId: ID!, platform: String, limit: Int): [MatchUpdate!]!
  listPlayerStatsRollups(
    userId: ID!
    granularity: String!
    periodId: String!
    platform: String
    limit: Int
  ): [PlayerStatsRollup!]!
  listPlayerDailyTrend(userId: ID!, platform: String, days: Int): [PlayerStatsRollup!]!
}

type PlayerProfile {
  userId: ID!
  gamerTag: String!
  primaryPlatform: String!
  fortniteId: String
  robloxId: String
  avatarUrl: String
  createdAtIso: AWSDateTime!
  updatedAtIso: AWSDateTime!
  versionId: Int!
}

type PublicPlayerProfile {
  userId: ID!
  gamerTag: String!
  primaryPlatform: String!
  avatarUrl: String
  createdAtIso: AWSDateTime!
}

type PlayerSearchHit {
  userId: ID!
  gamerTag: String!
  primaryPlatform: String!
  avatarUrl: String
}

input UpsertPlayerProfileInput {
  userId: ID!
  gamerTag: String!
  primaryPlatform: String!
  fortniteId: String
  robloxId: String
  avatarUrl: String
}

input LinkPlatformAccountInput {
  userId: ID!
  platform: String!
  externalId: String!
}

input MatchStatsInput {
  kills: Int
  deaths: Int
  placement: Int
  assists: Int
}

input MatchUpdateInput {
  userId: ID!
  matchId: ID!
  platform: String!
  summary: String!
  updatedAt: AWSDateTime!
  stats: MatchStatsInput
}

type Mutation {
  ping(message: String!): String!
  upsertPlayerProfile(input: UpsertPlayerProfileInput!): PlayerProfile!
  linkPlatformAccount(input: LinkPlatformAccountInput!): PlayerProfile!
  publishMatchUpdate(input: MatchUpdateInput!): MatchUpdate
}

type Subscription {
  onMatchUpdate(userId: ID!): MatchUpdate
    @aws_subscribe(mutations: ["publishMatchUpdate"])
}

type MatchStats {
  kills: Int
  deaths: Int
  placement: Int
  assists: Int
}

type MatchUpdate {
  userId: ID!
  matchId: ID!
  platform: String!
  summary: String!
  updatedAt: AWSDateTime!
  stats: MatchStats
}

type PlayerStatsRollup {
  userId: ID!
  platform: String!
  granularity: String!
  periodId: String!
  matchCount: Int!
  totalKills: Int!
  totalDeaths: Int!
  avgPlacement: Float!
  versionId: Int!
  lastUpdatedIso: AWSDateTime!
}
