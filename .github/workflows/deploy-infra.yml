name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/deploy-infra.yml"
  workflow_dispatch:

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_LOCKS_TABLE: ${{ vars.TF_STATE_LOCKS_TABLE || 'stats-games-tf-locks' }}
  TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'dev/terraform.tfstate' }}
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_VAR_project_name: ${{ vars.PROJECT_NAME || 'stats-games' }}
  TF_VAR_appsync_graphql_api_name: ${{ vars.APPSYNC_GRAPHQL_API_NAME || 'api' }}
  TF_VAR_webhook_secret: ${{ secrets.WEBHOOK_SECRET }}
  TF_VAR_fortnite_api_key: ${{ secrets.FORTNITE_API_KEY }}
  TF_VAR_riot_api_key: ${{ secrets.RIOT_API_KEY }}
  TF_VAR_ballchasing_api_key: ${{ secrets.BALLCHASING_API_KEY }}
  TF_VAR_valorant_region: ${{ vars.VALORANT_REGION || 'americas' }}
  TF_VAR_valorant_shard: ${{ vars.VALORANT_SHARD || 'na' }}

jobs:
  terraform:
    name: Plan & Apply
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate AWS OIDC role secret
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        run: |
          if [ -z "$AWS_DEPLOY_ROLE_ARN" ]; then
            echo "::error::Falta configurar el secret AWS_DEPLOY_ROLE_ARN en GitHub Actions."
            exit 1
          fi

      - name: Validate Terraform state backend config
        run: |
          if [ -z "$TF_STATE_BUCKET" ]; then
            echo "::error::Falta la repository variable TF_STATE_BUCKET."
            echo "::error::Ejecutar 'infra/bootstrap' una vez para crear el bucket y la tabla de locks."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.2
          terraform_wrapper: false

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: |
          terraform init -upgrade -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_STATE_LOCKS_TABLE}" \
            -backend-config="encrypt=true"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform apply
        run: bash scripts/terraform-apply.sh
