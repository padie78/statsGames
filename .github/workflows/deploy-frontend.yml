name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "apps/stats-games-web/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_LOCKS_TABLE: ${{ vars.TF_STATE_LOCKS_TABLE || 'stats-games-tf-locks' }}
  TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'dev/terraform.tfstate' }}
  BUILD_PATH: dist/apps/stats-games-web

jobs:
  build-and-deploy:
    name: Build & Sync to S3
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup monorepo
        uses: ./.github/actions/setup-node-monorepo

      - name: Validate AWS OIDC role secret
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        run: |
          if [ -z "$AWS_DEPLOY_ROLE_ARN" ]; then
            echo "::error::Falta configurar el secret AWS_DEPLOY_ROLE_ARN en GitHub Actions."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.2
          terraform_wrapper: false

      - name: Resolve infra outputs
        id: tf
        working-directory: infra
        run: |
          set -euo pipefail

          if [ -z "${TF_STATE_BUCKET}" ]; then
            echo "::error::Falta la repository variable TF_STATE_BUCKET."
            exit 1
          fi

          terraform init -input=false -no-color \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_STATE_LOCKS_TABLE}" \
            -backend-config="encrypt=true"

          terraform output -json > tf-outputs.json 2> tf-output.err || true
          if ! jq -e 'type == "object" and length > 0' tf-outputs.json >/dev/null 2>&1; then
            cat tf-output.err || true
            echo "::error::Terraform no tiene outputs disponibles. Ejecutá primero Deploy Infrastructure."
            exit 1
          fi

          BUCKET=$(jq -r '.frontend_bucket.value // empty' tf-outputs.json)
          DIST_ID=$(jq -r '.frontend_cloudfront_id.value // empty' tf-outputs.json)
          CF_DOMAIN=$(jq -r '.frontend_cloudfront_domain.value // empty' tf-outputs.json)
          APPSYNC_ENDPOINT=$(jq -r '.appsync_endpoint.value // empty' tf-outputs.json)
          APPSYNC_API_KEY=$(jq -r '.appsync_api_key.value // empty' tf-outputs.json)
          COGNITO_POOL=$(jq -r '.cognito_user_pool_id.value // empty' tf-outputs.json)
          COGNITO_CLIENT=$(jq -r '.cognito_web_client_id.value // empty' tf-outputs.json)
          COGNITO_DOMAIN=$(jq -r '.cognito_domain.value // empty' tf-outputs.json)
          WEBHOOK_API=$(jq -r '.webhook_api_endpoint.value // empty' tf-outputs.json)
          WEBHOOK_PATTERN=$(jq -r '.webhook_url_pattern.value // empty' tf-outputs.json)
          RSO_EXCHANGE=$(jq -r '.riot_rso_exchange_url.value // empty' tf-outputs.json)
          RIOT_RSO_CLIENT_ID=$(jq -r '.riot_rso_client_id.value // empty' tf-outputs.json)

          if [ -z "$BUCKET" ] || [ -z "$DIST_ID" ] || [ -z "$APPSYNC_ENDPOINT" ] || [ -z "$APPSYNC_API_KEY" ] || [ -z "$COGNITO_POOL" ] || [ -z "$COGNITO_CLIENT" ]; then
            echo "::error::Faltan outputs Terraform requeridos (frontend_bucket, frontend_cloudfront_id, appsync_endpoint, appsync_api_key, cognito_user_pool_id, cognito_web_client_id)."
            exit 1
          fi

          if [ -z "$WEBHOOK_API" ]; then
            echo "::error::Falta output webhook_api_endpoint (media proxy / RSO exchange)."
            exit 1
          fi

          {
            echo "bucket=$BUCKET"
            echo "distribution_id=$DIST_ID"
            echo "cloudfront_domain=$CF_DOMAIN"
            echo "appsync_endpoint=$APPSYNC_ENDPOINT"
            echo "cognito_user_pool_id=$COGNITO_POOL"
            echo "cognito_web_client_id=$COGNITO_CLIENT"
            echo "cognito_domain=$COGNITO_DOMAIN"
            echo "webhook_api_endpoint=$WEBHOOK_API"
            echo "webhook_url_pattern=$WEBHOOK_PATTERN"
            echo "riot_rso_exchange_url=$RSO_EXCHANGE"
            echo "riot_rso_client_id=$RIOT_RSO_CLIENT_ID"
          } >> "$GITHUB_OUTPUT"
          echo "::add-mask::$APPSYNC_API_KEY"
          echo "appsync_api_key=$APPSYNC_API_KEY" >> "$GITHUB_OUTPUT"

      - name: Inject runtime environment
        env:
          CF_DOMAIN: ${{ steps.tf.outputs.cloudfront_domain }}
          WEBHOOK_API: ${{ steps.tf.outputs.webhook_api_endpoint }}
          WEBHOOK_PATTERN: ${{ steps.tf.outputs.webhook_url_pattern }}
          RSO_EXCHANGE: ${{ steps.tf.outputs.riot_rso_exchange_url }}
          RIOT_RSO_CLIENT_ID: ${{ steps.tf.outputs.riot_rso_client_id }}
          COGNITO_DOMAIN: ${{ steps.tf.outputs.cognito_domain }}
        run: |
          set -euo pipefail
          ORIGIN="https://${CF_DOMAIN}"
          EXCHANGE_URL="${RSO_EXCHANGE:-${WEBHOOK_API}/integrations/riot/rso/exchange}"
          WEBHOOK_URL="${WEBHOOK_PATTERN:-${WEBHOOK_API}/webhooks/{platform}}"

          cat > apps/stats-games-web/src/environments/environment.prod.ts <<EOF
          import type { AppRuntimeEnvironment } from './environment.types';

          export const environment: AppRuntimeEnvironment = {
            production: true,
            appsync: {
              endpoint: '${{ steps.tf.outputs.appsync_endpoint }}',
              region: '${{ env.AWS_REGION }}',
              apiKey: '${{ steps.tf.outputs.appsync_api_key }}',
            },
            cognito: {
              userPoolId: '${{ steps.tf.outputs.cognito_user_pool_id }}',
              userPoolClientId: '${{ steps.tf.outputs.cognito_web_client_id }}',
              domain: '${COGNITO_DOMAIN}',
              oauthRedirectSignIn: '${ORIGIN}/auth/callback',
              oauthRedirectSignOut: '${ORIGIN}/login',
            },
            webhookUrlPattern: '${WEBHOOK_URL}',
            mediaProxyBaseUrl: '${WEBHOOK_API}',
            riot: {
              clientId: '${RIOT_RSO_CLIENT_ID}',
              redirectUri: '${ORIGIN}/integrations/riot/callback',
              authorizeUrl: 'https://auth.riotgames.com/authorize',
              scopes: 'openid offline_access',
              tokenExchangeUrl: '${EXCHANGE_URL}',
              accountUrl: 'https://account.riotgames.com/',
              valorantPrivacyHelpUrl:
                'https://support-valorant.riotgames.com/hc/en-us/articles/360047241634',
            },
          };
          EOF

      - name: Build Angular (production)
        run: npx nx build stats-games-web --configuration=production

      - name: Sync immutable assets to S3
        run: |
          aws s3 sync "${{ env.BUILD_PATH }}/" "s3://${{ steps.tf.outputs.bucket }}/" \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync index.html (no-cache)
        run: |
          aws s3 cp "${{ env.BUILD_PATH }}/index.html" "s3://${{ steps.tf.outputs.bucket }}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf.outputs.distribution_id }}" \
            --paths "/index.html" "/" \
            --no-cli-pager
