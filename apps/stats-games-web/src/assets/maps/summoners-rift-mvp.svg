<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Grieta del Invocador estilizada">
  <defs>
    <linearGradient id="rift-bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0c1a2e"/>
      <stop offset="50%" stop-color="#132238"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="blue-base" x1="0%" y1="100%" x2="40%" y2="60%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#2a4a6f"/>
    </linearGradient>
    <linearGradient id="red-base" x1="100%" y1="0%" x2="60%" y2="40%">
      <stop offset="0%" stop-color="#4a1e2e"/>
      <stop offset="100%" stop-color="#5a2a3a"/>
    </linearGradient>
    <radialGradient id="pit-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5d075" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f5d075" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="100" height="100" fill="url(#rift-bg)"/>

  <!-- Jungle texture -->
  <g fill="#162a40" opacity="0.55">
    <circle cx="28" cy="35" r="14"/>
    <circle cx="72" cy="65" r="14"/>
    <circle cx="35" cy="68" r="10"/>
    <circle cx="65" cy="32" r="10"/>
  </g>

  <!-- River diagonal -->
  <path
    d="M8 42 C22 48, 38 52, 50 50 C62 48, 78 42, 92 38"
    fill="none"
    stroke="#1a4a5c"
    stroke-width="7"
    opacity="0.7"
  />
  <path
    d="M8 42 C22 48, 38 52, 50 50 C62 48, 78 42, 92 38"
    fill="none"
    stroke="#22d3ee"
    stroke-width="0.35"
    opacity="0.35"
    stroke-dasharray="2 1.5"
  />

  <!-- Lanes -->
  <g stroke="#3d5578" stroke-width="2.2" stroke-linecap="round" opacity="0.55">
    <!-- Top -->
    <path d="M18 82 L18 22 L78 22"/>
    <!-- Mid -->
    <path d="M22 78 L78 22"/>
    <!-- Bot -->
    <path d="M22 82 L82 82 L82 22"/>
  </g>

  <!-- Blue base (bottom-left) -->
  <path d="M4 96 L4 68 L32 96 Z" fill="url(#blue-base)" stroke="#3d7aaf" stroke-width="0.5"/>
  <circle cx="14" cy="86" r="3.2" fill="#3de0f5" opacity="0.35"/>

  <!-- Red base (top-right) -->
  <path d="M96 4 L96 32 L68 4 Z" fill="url(#red-base)" stroke="#af3d5a" stroke-width="0.5"/>
  <circle cx="86" cy="14" r="3.2" fill="#ff4d9a" opacity="0.35"/>

  <!-- Dragon pit (bottom river) -->
  <circle cx="62" cy="62" r="5" fill="url(#pit-glow)"/>
  <circle cx="62" cy="62" r="2.4" fill="none" stroke="#f5d075" stroke-width="0.4" opacity="0.7"/>

  <!-- Baron pit (top river) -->
  <circle cx="38" cy="38" r="5" fill="url(#pit-glow)"/>
  <circle cx="38" cy="38" r="2.4" fill="none" stroke="#a78bfa" stroke-width="0.4" opacity="0.7"/>

  <!-- Labels -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="2.6" fill="#8fa3c4">
    <text x="8" y="94">Blue</text>
    <text x="84" y="8">Red</text>
    <text x="12" y="48">Top</text>
    <text x="46" y="52">Mid</text>
    <text x="72" y="90">Bot</text>
    <text x="66" y="64" fill="#f5d075" font-size="2.2">Dragon</text>
    <text x="28" y="36" fill="#a78bfa" font-size="2.2">Baron</text>
  </g>
</svg>
