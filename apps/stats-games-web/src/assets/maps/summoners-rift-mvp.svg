<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Grieta del Invocador estilizada">
  <defs>
    <linearGradient id="rift-void" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1428"/>
      <stop offset="55%" stop-color="#101c32"/>
      <stop offset="100%" stop-color="#161428"/>
    </linearGradient>

    <linearGradient id="rift-land" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a2844"/>
      <stop offset="50%" stop-color="#223450"/>
      <stop offset="100%" stop-color="#243556"/>
    </linearGradient>

    <linearGradient id="rift-jungle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#15263c"/>
      <stop offset="100%" stop-color="#1c3048"/>
    </linearGradient>

    <linearGradient id="blue-nexus" x1="0%" y1="100%" x2="45%" y2="55%">
      <stop offset="0%" stop-color="#163a5c"/>
      <stop offset="100%" stop-color="#2a5a88"/>
    </linearGradient>

    <linearGradient id="red-nexus" x1="100%" y1="0%" x2="55%" y2="45%">
      <stop offset="0%" stop-color="#4a1a2e"/>
      <stop offset="100%" stop-color="#7a2e48"/>
    </linearGradient>

    <linearGradient id="river-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#123848"/>
      <stop offset="50%" stop-color="#1a4a5c"/>
      <stop offset="100%" stop-color="#164058"/>
    </linearGradient>

    <radialGradient id="blue-glow" cx="14%" cy="86%" r="28%">
      <stop offset="0%" stop-color="#3de0f5" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#3de0f5" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#3de0f5" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="red-glow" cx="86%" cy="14%" r="28%">
      <stop offset="0%" stop-color="#ff4d9a" stop-opacity="0.2"/>
      <stop offset="55%" stop-color="#ff4d9a" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ff4d9a" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="mid-glow" cx="50%" cy="50%" r="22%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="dragon-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5d075" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#f5d075" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="baron-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>

    <filter id="soft-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.35"/>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="100" height="100" fill="url(#rift-void)"/>

  <!-- Grid sutil (mismo lenguaje que Fortnite) -->
  <g stroke="#2a3d5c" stroke-width="0.15" opacity="0.32">
    <path d="M0 20 H100 M0 40 H100 M0 60 H100 M0 80 H100"/>
    <path d="M20 0 V100 M40 0 V100 M60 0 V100 M80 0 V100"/>
  </g>

  <!-- Glow de bases -->
  <rect width="100" height="100" fill="url(#blue-glow)"/>
  <rect width="100" height="100" fill="url(#red-glow)"/>
  <circle cx="50" cy="50" r="18" fill="url(#mid-glow)"/>

  <!-- Masa de terreno principal (isla / rift board) -->
  <path
    d="M10 90
       C8 72, 10 52, 14 38
       C18 24, 28 12, 42 8
       C56 4, 72 6, 84 14
       C92 20, 96 34, 94 48
       C92 64, 88 78, 78 88
       C66 96, 48 98, 32 96
       C22 95, 14 94, 10 90 Z"
    fill="url(#rift-land)"
    stroke="#3d5578"
    stroke-width="0.55"
  />

  <!-- Jungla azul (abajo-izq / top-side blue) -->
  <path
    d="M18 78 C16 62, 20 48, 28 42 C36 36, 42 44, 40 56 C38 68, 30 78, 22 82 Z"
    fill="url(#rift-jungle)"
    stroke="#2f4668"
    stroke-width="0.35"
    opacity="0.9"
  />

  <!-- Jungla roja (arriba-der) -->
  <path
    d="M78 22 C80 36, 76 50, 68 56 C60 62, 54 54, 56 42 C58 30, 66 20, 74 18 Z"
    fill="url(#rift-jungle)"
    stroke="#2f4668"
    stroke-width="0.35"
    opacity="0.9"
  />

  <!-- Río diagonal con cuerpo + borde glow -->
  <path
    d="M6 40
       C18 46, 32 52, 44 52
       C56 52, 70 46, 86 36
       C90 34, 94 32, 96 30
       L94 38
       C80 48, 64 56, 50 56
       C36 56, 20 48, 8 44 Z"
    fill="url(#river-fill)"
    opacity="0.85"
  />
  <path
    d="M8 42 C22 48, 38 52, 50 50 C62 48, 78 40, 92 34"
    fill="none"
    stroke="#22d3ee"
    stroke-width="0.4"
    opacity="0.45"
    stroke-dasharray="2.2 1.4"
    stroke-linecap="round"
  />

  <!-- Lanes con doble trazo (base oscura + highlight) -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top -->
    <path d="M16 84 L16 20 L80 20" stroke="#1a2840" stroke-width="3.2" opacity="0.7"/>
    <path d="M16 84 L16 20 L80 20" stroke="#4a6588" stroke-width="1.5" opacity="0.75"/>
    <!-- Mid -->
    <path d="M22 78 L78 22" stroke="#1a2840" stroke-width="3.2" opacity="0.7"/>
    <path d="M22 78 L78 22" stroke="#4a6588" stroke-width="1.5" opacity="0.8"/>
    <!-- Bot -->
    <path d="M20 84 L84 84 L84 20" stroke="#1a2840" stroke-width="3.2" opacity="0.7"/>
    <path d="M20 84 L84 84 L84 20" stroke="#4a6588" stroke-width="1.5" opacity="0.75"/>
  </g>

  <!-- Torres (marcadores sutiles en lanes) -->
  <g opacity="0.55">
    <rect x="15" y="58" width="2" height="2" rx="0.3" fill="#8fa3c4"/>
    <rect x="15" y="38" width="2" height="2" rx="0.3" fill="#8fa3c4"/>
    <rect x="38" y="19" width="2" height="2" rx="0.3" fill="#8fa3c4"/>
    <rect x="58" y="19" width="2" height="2" rx="0.3" fill="#c4a08f"/>
    <rect x="36" y="48" width="2" height="2" rx="0.3" fill="#8fa3c4" transform="rotate(45 37 49)"/>
    <rect x="48" y="36" width="2" height="2" rx="0.3" fill="#c4a08f" transform="rotate(45 49 37)"/>
    <rect x="58" y="83" width="2" height="2" rx="0.3" fill="#8fa3c4"/>
    <rect x="78" y="83" width="2" height="2" rx="0.3" fill="#8fa3c4"/>
    <rect x="83" y="58" width="2" height="2" rx="0.3" fill="#c4a08f"/>
    <rect x="83" y="38" width="2" height="2" rx="0.3" fill="#c4a08f"/>
  </g>

  <!-- Blue base -->
  <path
    d="M6 94 L6 66 L34 94 Z"
    fill="url(#blue-nexus)"
    stroke="#3de0f5"
    stroke-width="0.45"
    opacity="0.95"
  />
  <circle cx="14" cy="86" r="4.2" fill="#3de0f5" opacity="0.18" filter="url(#soft-blur)"/>
  <circle cx="14" cy="86" r="2.1" fill="#3de0f5" opacity="0.55"/>
  <circle cx="14" cy="86" r="0.9" fill="#e8fbff"/>

  <!-- Red base -->
  <path
    d="M94 6 L94 34 L66 6 Z"
    fill="url(#red-nexus)"
    stroke="#ff4d9a"
    stroke-width="0.45"
    opacity="0.95"
  />
  <circle cx="86" cy="14" r="4.2" fill="#ff4d9a" opacity="0.18" filter="url(#soft-blur)"/>
  <circle cx="86" cy="14" r="2.1" fill="#ff4d9a" opacity="0.55"/>
  <circle cx="86" cy="14" r="0.9" fill="#ffe8f2"/>

  <!-- Dragon pit -->
  <circle cx="62" cy="62" r="7" fill="url(#dragon-glow)"/>
  <circle cx="62" cy="62" r="3.4" fill="none" stroke="#f5d075" stroke-width="0.45" opacity="0.7" stroke-dasharray="1.6 1.1"/>
  <circle cx="62" cy="62" r="1.35" fill="#f5d075"/>

  <!-- Baron pit -->
  <circle cx="38" cy="38" r="7" fill="url(#baron-glow)"/>
  <circle cx="38" cy="38" r="3.4" fill="none" stroke="#a78bfa" stroke-width="0.45" opacity="0.7" stroke-dasharray="1.6 1.1"/>
  <circle cx="38" cy="38" r="1.35" fill="#a78bfa"/>

  <!-- Mid marker -->
  <circle cx="50" cy="50" r="2.6" fill="none" stroke="#22d3ee" stroke-width="0.35" opacity="0.5" stroke-dasharray="1.2 1"/>
  <circle cx="50" cy="50" r="1.1" fill="#22d3ee" opacity="0.85"/>

  <!-- POIs con dots (estilo Fortnite) -->
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="2.55" fill="#8fa3c4">
    <circle cx="14" cy="86" r="1.15" fill="#3de0f5"/>
    <text x="17.2" y="86.9">Blue Base</text>

    <circle cx="86" cy="14" r="1.15" fill="#ff4d9a"/>
    <text x="68" y="12.2">Red Base</text>

    <circle cx="16" cy="40" r="1.15" fill="#f5d075"/>
    <text x="19" y="40.9">Top Lane</text>

    <circle cx="50" cy="50" r="1.15" fill="#22d3ee"/>
    <text x="53.2" y="48.4">Mid</text>

    <circle cx="78" cy="84" r="1.15" fill="#f5d075"/>
    <text x="62.5" y="91.5">Bot Lane</text>

    <circle cx="62" cy="62" r="1.15" fill="#f5d075"/>
    <text x="65.5" y="66.8" fill="#f5d075">Dragon</text>

    <circle cx="38" cy="38" r="1.15" fill="#a78bfa"/>
    <text x="22" y="34.5" fill="#a78bfa">Baron</text>

    <circle cx="28" cy="58" r="1.05" fill="#8fa3c4"/>
    <text x="18" y="64.5" font-size="2.2">Blue JG</text>

    <circle cx="72" cy="42" r="1.05" fill="#8fa3c4"/>
    <text x="74.5" y="41.2" font-size="2.2">Red JG</text>
  </g>
</svg>
